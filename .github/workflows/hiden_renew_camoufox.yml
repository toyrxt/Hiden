name: HidenCloud-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '32 4 * * *'

permissions:
  contents: write

jobs:
  run_hiden_renew:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下载公库代码
        uses: actions/checkout@v4

      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/HidenCloud-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private
          fetch-depth: 0

      - name: 📂 移动脚本和状态文件到工作目录
        run: |
          mv private/hiden_renew_camoufox.py hiden_renew_camoufox.py
          cp private/storage_state.json . 2>/dev/null || echo "无登录态缓存，首次运行"
          cp private/last_renew.txt . 2>/dev/null || echo "无续期记录，首次运行"

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛠️ 安装 Firefox 系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgbm1 libasound2t64 libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxrandr2 libpango-1.0-0 libcairo2 libgtk-3-0 xvfb

      - name: 🐍 安装 Python 依赖
        run: |
          pip install -r requirements.txt -q

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          HIDEN_ACCOUNT: ${{ secrets.HIDEN_ACCOUNT }}
          HIDEN_SERVICE_ID: ${{ secrets.HIDEN_SERVICE_ID }}
          TG_BOT: ${{ secrets.TG_BOT }}
          DISPLAY: :99
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          python hiden_renew_camoufox.py

      - name: 💾 保存状态到私库
        if: always()
        run: |
          [ -f storage_state.json ] && cp storage_state.json private/storage_state.json || true
          [ -f last_renew.txt ] && cp last_renew.txt private/last_renew.txt || true
          [ -f README.md ] && cp README.md private/README.md || true
          cd private
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add storage_state.json last_renew.txt README.md 2>/dev/null || true
          git commit -m "Update renewal state [skip ci]" || echo "无变更"
          git push || echo "推送失败"

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
